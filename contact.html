<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="野蛮僧侣技术支持与联系方式。"
    />
    <title>联系我们 - Singularity Games / 奇点游戏</title>
    <link rel="stylesheet" href="./styles.css?v=font-zh-1" />
  </head>
  <body>
    <canvas id="particleCanvas" class="particle-canvas" aria-hidden="true"></canvas>
    <div id="burstLayer" class="burst-layer" aria-hidden="true"></div>

    <div class="stage-bg" aria-hidden="true">
      <video
        class="stage-video"
        autoplay
        muted
        loop
        playsinline
        preload="auto"
      >
        <source src="./assets/homepage-pipe-animation.mp4" type="video/mp4" />
      </video>
      <div class="video-shade"></div>
      <div class="grid-plane"></div>
      <div class="light-trails"></div>
      <div class="scan-field"></div>
    </div>

    <header class="site-header" data-reveal>
      <a class="brand" href="./index.html#home" aria-label="Singularity Games home">
        <span class="brand-mark">
          <span></span>
        </span>
        <span class="brand-copy">
          <strong>Singularity Games</strong>
          <small>奇点游戏</small>
        </span>
      </a>

      <nav class="site-nav" aria-label="主导航">
        <a href="./index.html#home" data-i18n="navHome">首页</a>
        <a href="./index.html#products" data-i18n="navProducts">产品</a>
        <a href="./about.html" data-i18n="navAbout">关于我们</a>
        <a class="is-current" href="./contact.html" data-i18n="navContact">联系我们</a>
      </nav>

      <div class="language-switch" aria-label="语言切换">
        <button class="is-active" type="button" data-lang="zh">中文</button>
        <button type="button" data-lang="en">English</button>
        <button type="button" data-lang="ja">日本語</button>
      </div>
    </header>

    <main>
      <section id="contact-page" class="section contact-section">
        <article class="contact-minimal-panel reveal-card" data-reveal>
          <span class="contact-glow-dot" aria-hidden="true"></span>
          <h1 data-i18n="contactTitle">联系我们</h1>

          <div class="contact-minimal-copy">
            <p data-i18n="contactPrimaryBody">
              如有任何关于游戏的问题、错误报告或请求，请发送至以下电子邮件地址。
            </p>
            <p data-i18n="contactSupportBody">
              如有任何疑问、错误报告或功能请求，请发送电子邮件至：
            </p>
            <a class="contact-minimal-mail" href="mailto:sgames@hanlian.com">sgames@hanlian.com</a>
          </div>

          <div class="contact-minimal-meta">
            <div class="contact-minimal-group">
              <h2 data-i18n="contactLanguagesTitle">支持的语言</h2>
              <p data-i18n="contactLanguagesValue">日语/中文/英语</p>
            </div>

            <div class="contact-minimal-group">
              <h2 data-i18n="contactDeveloperTitle">开发者</h2>
              <p data-i18n="contactDeveloperValue">汉联游戏</p>
            </div>
          </div>

          <p class="contact-minimal-footer" data-i18n="contactFooterNote">《野蛮僧侣》 © 2026 汉联游戏</p>
          <div class="contact-constellation" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </article>
      </section>
    </main>

    <footer id="contact" class="site-footer contact-site-footer">
      <div class="footer-scan" aria-hidden="true"></div>
      <div class="footer-inner">
        <div class="footer-brand">
          <span class="brand-mark">
            <span></span>
          </span>
          <div>
            <strong>Singularity Games / 奇点游戏</strong>
            <p data-i18n="footerTagline">创新游戏与 AI 体验的领导者</p>
          </div>
        </div>
        <div class="footer-contact">
          <strong data-i18n="footerContact">联系我们</strong>
          <a href="mailto:sgames@hanlian.com">sgames@hanlian.com</a>
        </div>
      </div>
      <p class="copyright">© 2026 Singularity Games. 保留所有权利。</p>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
